{{ define "style" }}
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Georgia', 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
    background: #f8f8f8;
    color: #333;
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #eee;
    display: flex; align-items: center;
    padding: 0 20px;
    z-index: 1000;
  }

  .header a {
    display: flex; align-items: center;
    text-decoration: none; color: #333;
  }

  .logo { width: 32px; height: 32px; margin-right: 10px; }
  .brand-name { font-size: 16px; font-weight: 600; }

  .back-link {
    margin-left: auto;
    font-size: 13px; color: #999;
    text-decoration: none;
  }
  .back-link:hover { color: #333; }

  .article {
    max-width: 720px;
    margin: 0 auto;
    padding: 80px 20px 60px;
  }

  .article-header { margin-bottom: 40px; text-align: center; }

  .article-header h1 {
    font-size: 32px; font-weight: 700;
    color: #222; margin-bottom: 12px;
  }

  .article-meta {
    font-size: 14px; color: #999;
  }

  .article-content {
    font-size: 17px; color: #333;
    line-height: 1.9;
  }

  .article-content p { margin-bottom: 1.2em; }
  .article-content h2 { font-size: 24px; margin: 2em 0 0.8em; color: #222; }
  .article-content h3 { font-size: 20px; margin: 1.5em 0 0.6em; color: #333; }
  .article-content img { max-width: 100%; border-radius: 4px; margin: 1em 0; }
  .article-content blockquote {
    border-left: 4px solid #4a85c5;
    padding: 8px 16px; margin: 1em 0;
    color: #666; background: #f0f4f8;
    border-radius: 0 4px 4px 0;
  }
  .article-content code {
    background: #f0f0f0; padding: 2px 6px;
    border-radius: 3px; font-size: 0.9em;
  }
  .article-content pre {
    background: #282c34; color: #abb2bf;
    padding: 16px; border-radius: 6px;
    overflow-x: auto; margin: 1em 0;
  }
  .article-content pre code { background: none; padding: 0; color: inherit; }
  .article-content ul, .article-content ol { padding-left: 24px; margin-bottom: 1em; }
  .article-content li { margin-bottom: 0.4em; }

  .original-link {
    display: inline-block;
    margin-top: 30px; padding: 8px 20px;
    background: #4a85c5; color: #fff;
    text-decoration: none; border-radius: 4px;
    font-size: 14px;
  }
  .original-link:hover { background: #3a6fa8; }

  .footer {
    text-align: center;
    padding: 20px; color: #bbb;
    font-size: 12px;
  }

  @media (max-width: 768px) {
    .article-header h1 { font-size: 24px; }
    .article-content { font-size: 16px; }
  }
</style>
{{ end }}

{{ define "main" }}
<div class="header">
  <a href="{{ "/" | relURL }}">
    <img src="{{ "images/FXTwink-LOGO.svg" | relURL }}" alt="FXTWink Logo" class="logo">
    <span class="brand-name">FXTWink</span>
  </a>
  <a href="{{ "/posts/" | relURL }}" class="back-link">&larr; 文章列表</a>
</div>

<article class="article">
  <div class="article-header">
    <h1>{{ .Title }}</h1>
    <div class="article-meta">{{ .Date.Format "2006年01月02日" }}</div>
  </div>

  <div class="article-content">
    {{ .Content }}
  </div>

  {{ with .Params.link }}
  <a href="{{ . }}" target="_blank" class="original-link">阅读原文 &rarr;</a>
  {{ end }}
</article>

<div class="footer">&copy; {{ now.Format "2006" }} FXTWink</div>
{{ end }}
