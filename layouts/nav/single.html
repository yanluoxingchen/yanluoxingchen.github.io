<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ .Title }} - FXTWink</title>
<link rel="icon" href="{{ "images/FXTwink-LOGO.svg" | relURL }}" type="image/svg+xml">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: #f0f2f5;
    color: #333;
    min-height: 100vh;
  }

  .header {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 0 20px; height: 56px;
    display: flex; align-items: center;
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 1000;
  }

  .header a {
    display: flex; align-items: center;
    text-decoration: none; color: #333;
  }

  .logo { width: 32px; height: 32px; margin-right: 10px; }
  .brand { font-size: 16px; font-weight: 600; }

  .back { margin-left: auto; font-size: 13px; color: #999; text-decoration: none; }
  .back:hover { color: #333; }

  .content {
    padding: 80px 20px 40px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .page-title {
    font-size: 28px; font-weight: 700;
    color: #222; margin-bottom: 32px;
    text-align: center;
  }

  .groups {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .group-card {
    background: #fff;
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .group-name {
    font-size: 16px; font-weight: 600;
    color: #333; margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid #4a85c5;
  }

  .link-list { list-style: none; }

  .link-list li { margin-bottom: 10px; }

  .link-list a {
    display: block;
    padding: 8px 12px;
    border-radius: 4px;
    color: #4a85c5;
    text-decoration: none;
    font-size: 14px;
    transition: background 0.2s;
  }

  .link-list a:hover {
    background: #e8f0f8;
    color: #2a5a8a;
  }

  .link-list a::before {
    content: '🔗 ';
    font-size: 12px;
  }

  @media (max-width: 600px) {
    .groups { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="header">
  <a href="{{ "/" | relURL }}">
    <img src="{{ "images/FXTwink-LOGO.svg" | relURL }}" alt="Logo" class="logo">
    <span class="brand">FXTWink</span>
  </a>
  <a href="{{ "/" | relURL }}" class="back">&larr; 指示牌</a>
</div>

<div class="content">
  <h1 class="page-title">导航</h1>
  <div class="groups">
    {{ range .Params.groups }}
    <div class="group-card">
      <div class="group-name">{{ .name }}</div>
      <ul class="link-list">
        {{ range .links }}
        <li><a href="{{ .url }}" target="_blank">{{ .name }}</a></li>
        {{ end }}
      </ul>
    </div>
    {{ end }}
  </div>
</div>
</body>
</html>
