# Use DecapBridge PKCE auth
backend:
  name: git-gateway
  repo: yanluoxingchen/yanluoxingchen.github.io
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/d096b9e9-432b-4508-a6ed-21cf02364b13/pkce
  auth_token_endpoint: /sites/d096b9e9-432b-4508-a6ed-21cf02364b13/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://www.fxtwink.com
locale: zh_Hans

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "文章"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "日期", name: "date", widget: "datetime" }
      - { label: "预览图", name: "image", widget: "image", required: false }
      - { label: "外部链接", name: "link", widget: "string", required: false }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "pages"
    label: "页面"
    files:
      - label: "指示牌"
        name: "home"
        file: "content/_index.md"
        fields:
          - { label: "标题", name: "title", widget: "string" }
          - { label: "副标题", name: "subtitle", widget: "string" }
          - { label: "邮箱", name: "email", widget: "string" }
          - label: "社交链接"
            name: "links"
            widget: "list"
            fields:
              - { label: "名称", name: "name", widget: "string" }
              - { label: "链接", name: "url", widget: "string" }
              - { label: "二维码图片", name: "qr", widget: "image", required: false }
          - label: "项目列表"
            name: "projects"
            widget: "list"
            fields:
              - { label: "名称", name: "name", widget: "string" }
              - { label: "链接", name: "url", widget: "string" }
              - { label: "图标(emoji)", name: "icon", widget: "string" }
              - { label: "颜色类型", name: "color", widget: "select", options: ["user", "link", "code", "lock"] }

      - label: "简历"
        name: "resume"
        file: "content/resume.md"
        fields:
          - { label: "姓名", name: "name", widget: "string" }
          - { label: "出生年份", name: "birth_year", widget: "number", value_type: "int", hint: "系统自动计算年龄" }
          - { label: "学历", name: "education", widget: "string" }
          - { label: "电话", name: "phone", widget: "string" }
          - { label: "所在地", name: "location", widget: "string" }
          - { label: "邮箱", name: "email", widget: "string" }
          - { label: "个人网站", name: "website", widget: "string" }
          - { label: "GitHub", name: "github", widget: "string" }
          - { label: "个人简介", name: "bio", widget: "text" }
          - label: "求职意向"
            name: "job_target"
            widget: "object"
            fields:
              - { label: "意向岗位", name: "positions", widget: "list", default: ["硬件工程师"] }
              - { label: "意向城市", name: "city", widget: "string" }
              - { label: "期望薪资", name: "salary", widget: "string" }
          - label: "专业技能"
            name: "skills"
            widget: "list"
            fields:
              - { label: "技能名", name: "name", widget: "string" }
              - { label: "熟练度(%)", name: "level", widget: "number", value_type: "int", min: 0, max: 100 }
          - label: "工作经历"
            name: "experiences"
            widget: "list"
            fields:
              - { label: "日期", name: "date", widget: "string" }
              - { label: "地点", name: "location", widget: "string" }
              - { label: "公司", name: "company", widget: "string", required: false }
              - { label: "职位", name: "role", widget: "string" }
              - { label: "详情", name: "details", widget: "list" }
          - label: "教育"
            name: "education_items"
            widget: "list"
            fields:
              - { label: "日期", name: "date", widget: "string" }
              - { label: "地点", name: "location", widget: "string" }
              - { label: "描述", name: "role", widget: "string" }
              - { label: "详情", name: "details", widget: "list" }
          - label: "项目经历"
            name: "projects"
            widget: "list"
            fields:
              - { label: "项目名", name: "name", widget: "string" }
              - { label: "描述", name: "desc", widget: "text" }
          - label: "荣誉"
            name: "honors"
            widget: "list"

      - label: "导航"
        name: "nav"
        file: "content/nav.md"
        fields:
          - label: "链接分组"
            name: "groups"
            widget: "list"
            fields:
              - { label: "分组名", name: "name", widget: "string" }
              - label: "链接列表"
                name: "links"
                widget: "list"
                fields:
                  - { label: "名称", name: "name", widget: "string" }
                  - { label: "链接", name: "url", widget: "string" }
